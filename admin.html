<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | TubeBoost Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <div class="login-container">
        <h2 style="margin-bottom: 20px;">Admin <span>Login</span></h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="adminUser" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="adminPass" placeholder="Password" required>
            </div>
            <button type="submit" class="btn submit-btn">Login to Dashboard</button>
        </form>
        <p id="loginError" class="error-msg" style="text-align: center; margin-top: 15px;"></p>
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: var(--text-gray); text-decoration: none; font-size: 0.9rem;">← Back to Site</a>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
